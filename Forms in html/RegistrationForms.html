<!DOCTYPE html>
<html>
    <head>
        <title>Registration Form</title>
    </head>
    <body>
        <form>
            <fieldset>
                <!--The fieldset tag is used to group related elements in a forms and draws a box around them.-->
                <centre>
                <legend><h2>Personal Information:</h2></legend>
                <figure>
                    <img src="online2.png" />
                    <figcaption><h4>Register Now!</h4></figcaption>
                </figure>
                <label>Name:</label><br>
                <input type="text" id="name"><br><br>
                <label>Email ID:</label><br>
                <input type="email" id="email"><br><br>
                <label>Contact Number:</label><br>
                <input type="password" id="contact"><br><br>
                <label>Gender:</label><br>
                <input type="radio" id="gender" value="female">Female<br>
                <input type="radio" id="gender" value="male">Male<br>
                <label>Favourite City:</label>
                <input type="checkbox" id="city" value="New Delhi">New Delhi<br>
                <input type="checkbox" id="city" value="Bengaluru">Bengaluru<br>
                <input type="checkbox" id="city" value="Chennai">Chennai<br>
                <input type="checkbox" id="city" value="Mumbai">Mumbai</input><br><br>
                <label>Birthday:</label>
                <input type="date" id="birthday" name="birthday"><br>
                <input type="text" id="name"><br><br>
                <label>Enter Marks:</label><br>
                <select name="subject" id="subject">
                    <option value="Maths">Maths</option>
                    <option value="English">English</option>
                    <option value="Science">Science</option>
                </select>
                <input type="number" id="m1" name="m1"><br><br>
                <select name="Subject 2" id="Subject 2">
                    <option value="Maths">Maths</option>
                    <option value="English">English</option>
                    <option value="Science">Science</option>
                </select>
                <input type="number" id="m2" name="m2"><br><br>
                <select name="Subject3" id="Subject3">
                    <option value="Maths">Maths</option>
                    <option value="English"> English</option>
                    <option value="Science">Science</option>
                </select>
                <input type="number" id="m3" name="m3"><br><br>
                Average: <output name="x" for="m1 m2 m3"></output><br><br>
                <input type="submit">
                </centre>
            </fieldset>
        </form>
    </body>
</html>
