<!DOCTYPE html>
<html>

<head>
    <title>Animals in the jungle</title>

    <!--Internal CSS-->
    <style>
        h2 {
            color: darkgreen;
        }
    </style>

    <!--External CSS-->
    <link rel="stylesheet" href="style3.css">
</head>

<body>

    <hr>

    <!--Inline CSS-->
    <h1 style="color:orange;">The Lion: King of the Jungle</h1>
    <img src="lion.webp" alt="lion" width="350" height="200"><br>
    <!--Internal CSS-->
    <h3>The Dolphin: Intelligent Marine Mammal</h3>
<img src="dolphin.avif" alt="dolphin" width="350" height="200"><br>
    <!--External CSS-->
    <h3>The Eagle: Master of the Sky</h3>
<img src="eagle.jpeg" alt="eagle" width="350" height="200"><br>
    <hr>

    <!--Element selector example-->
    <h4><b>The Elephant: Largest Land Animal</b></h4>
    <img src="elephant.jpg" alt="elephant" width="350" height="200"><br>
    <h4><i>The Cheetah: Fastest Land Animal</i> </h4>
<img src="cheetah.jpg" alt="cheetah" width="350" height="200"><br>
    <hr>
